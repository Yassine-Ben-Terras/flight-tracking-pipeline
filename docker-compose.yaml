networks:
  flight-network:
    driver: bridge

volumes:
  cassandra_data:
  grafana_data:

services:

  # ---------------------------------------------------------------------------
  # ZOOKEEPER
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - flight-network
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # KAFKA
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - flight-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # CASSANDRA
  # ---------------------------------------------------------------------------
  cassandra:
    image: cassandra:latest
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=FlightCluster
    networks:
      - flight-network
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # POSTGRESQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: dbt_password
      POSTGRES_DB: flight_warehouse
    ports:
      - "5433:5432"
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
    networks:
      - flight-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt_user -d flight_warehouse && psql -U dbt_user -d flight_warehouse -tAc \"SELECT 1 FROM pg_database WHERE datname='airflow_metadata'\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # SPARK MASTER
  # ---------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.0
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - flight-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # SPARK WORKER
  # ---------------------------------------------------------------------------
  spark-worker:
    image: apache/spark:3.5.0
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - flight-network

  # ---------------------------------------------------------------------------
  # SPARK STREAMING JOB
  # Builds its own image with JARs baked in — no Maven download needed.
  # Automatically submits streaming_consumer.py on startup.
  # ---------------------------------------------------------------------------
  spark-streaming:
    build:
      context: .
      dockerfile: spark-jobs/Dockerfile
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --jars /opt/spark/jars/extra/spark-sql-kafka-0-10_2.12-3.5.0.jar,/opt/spark/jars/extra/kafka-clients-3.4.1.jar,/opt/spark/jars/extra/postgresql-42.7.3.jar,/opt/spark/jars/extra/spark-token-provider-kafka-0-10_2.12-3.5.0.jar,/opt/spark/jars/extra/commons-pool2-2.11.1.jar
      /opt/spark-jobs/streaming_consumer.py
    depends_on:
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - flight-network
    restart: on-failure

  # ---------------------------------------------------------------------------
  # FLIGHT PRODUCER
  # Replays sample_flights.parquet into Kafka every 60 seconds forever.
  # ---------------------------------------------------------------------------
  flight-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - flight-network
    restart: on-failure
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PARQUET_PATH=/app/data/sample_flights.parquet

  # ---------------------------------------------------------------------------
  # GRAFANA
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Auto-provision the PostgreSQL datasource so you never have to
      # configure it manually in the UI again
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - flight-network
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # AIRFLOW INIT
  # ---------------------------------------------------------------------------
  airflow-init:
    image: apache/airflow:2.8.1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flight-network
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dbt_user:dbt_password@postgres:5432/airflow_metadata
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "

  # ---------------------------------------------------------------------------
  # AIRFLOW WEBSERVER
  # ---------------------------------------------------------------------------
  airflow-webserver:
    image: apache/airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - flight-network
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./dbt_project:/opt/airflow/dbt_project
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dbt_user:dbt_password@postgres:5432/airflow_metadata
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _PIP_ADDITIONAL_REQUIREMENTS=dbt-postgres
    command: webserver

  # ---------------------------------------------------------------------------
  # AIRFLOW SCHEDULER
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    image: apache/airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - flight-network
    restart: always
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./dbt_project:/opt/airflow/dbt_project
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://dbt_user:dbt_password@postgres:5432/airflow_metadata
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _PIP_ADDITIONAL_REQUIREMENTS=dbt-postgres
    command: scheduler
